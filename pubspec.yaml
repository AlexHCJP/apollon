name: apollon
description: "Apollon is a state management library for Flutter, inspired by Riverpod, but with a much smaller API surface and a focus on simplicity and ease of use."
version: 1.0.1

homepage: https://github.com/AlexHCJP/apollon
repository: https://github.com/AlexHCJP/apollon
issue_tracker: https://github.com/AlexHCJP/apollon/issues

topics:
  - state-management
  - flutter
  - dart
  - provider

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ^3.11.0
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0